let bird = {
  x: 70,
  y: 220,
  width: 45,
  height: 45,
  velocity: 0
};

let gravity = 0.5;
let flapPower = -8;
let pipes = [];
let score = 0;
let gameRunning = false;
let questionActive = false;

let debugHitbox = false; // set to true to see hitboxes
let countdown = 3;
let countdownActive = true;
let pipeTimer = 0;

const questions = [
  {
    question: "What is phagocytosis?",
    options: [
      "Production of antibodies",
      "Process of engulfing pathogens",
      "Killing viruses using drugs",
      "Making memory cells"
    ],

  },
  {

    options: [

    ],

  },
  {

    options: ["Fungus", "Virus", "Bacteria", "Protozoa"],
    answer: "Fungus"
  },
  {
    question: "Which pathogen is usually treated with antibiotics?",
    options: ["Virus", "Bacteria", "Fungus", "Protozoa"],
    answer: "Bacteria"
  }
];

function startCountdown() {
  countdown = 3;
  countdownActive = true;
  gameRunning = false;

  let interval = setInterval(() => {
    countdown--;

    if (countdown < 0) {
      clearInterval(interval);
      countdownActive = false;
      gameRunning = true;
    }
  }, 1000);
}

function flap() {
  if (gameRunning && !questionActive && !countdownActive) {
    bird.velocity = flapPower;
  }
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    flap();
  }
});

canvas.addEventListener("click", flap);

canvas.addEventListener("touchstart", function(e) {
  e.preventDefault();
  flap();
});

function createPipe() {
  let gap = 150;
  let topHeight = Math.floor(Math.random() * 230) + 50;

  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: topHeight + gap,
    width: 90,
    passed: false
  });
}

function drawBackground() {
  if (backgroundImage.complete) {
    ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = "#f8b6c1";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function drawBird() {
  if (birdImage.complete) {
    ctx.drawImage(
      birdImage,
      bird.x - bird.width / 2,
      bird.y - bird.height / 2,
      bird.width,
      bird.height
    );
  } else {
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, 20, 0, Math.PI * 2);
    ctx.fillStyle = "pink";
    ctx.fill();
    ctx.strokeStyle = "black";
    ctx.stroke();
  }
}

function drawPipes() {
  pipes.forEach(pipe => {

    // Top obstacle, flipped upside down
    ctx.save();
    ctx.translate(pipe.x + pipe.width / 2, pipe.top / 2);
    ctx.rotate(Math.PI);
    ctx.drawImage(
      pipeImage,
      -pipe.width / 2,
      -pipe.top / 2,
      pipe.width,
      pipe.top
    );
    ctx.restore();

    // Bottom obstacle
    ctx.drawImage(
      pipeImage,
      pipe.x,
      pipe.bottom,
      pipe.width,
      canvas.height - pipe.bottom
    );
  });
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "24px Arial";
  ctx.textAlign = "left";
  ctx.fillText("Score: " + score, 10, 30);
}

function drawCountdown() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "60px Arial";
  ctx.textAlign = "center";

  if (countdown > 0) {
    ctx.fillText(countdown, canvas.width / 2, canvas.height / 2);
  } else {
    ctx.fillText("GO!", canvas.width / 2, canvas.height / 2);
  }

  ctx.textAlign = "left";
}

function checkCollision() {
  // Shrink bird hitbox to 65% of sprite for fairness
  let shrink = 0.30;
  let left = bird.x - bird.width * (0.5 - shrink);
  let right = bird.x + bird.width * (0.5 - shrink);
  let top = bird.y - bird.height * (0.5 - shrink);
  let bottom = bird.y + bird.height * (0.5 - shrink);

  if (bottom > canvas.height || top < 0) {
    loseGame();
  }

  pipes.forEach(pipe => {
    // Pixel-accurate hitbox: cilia solid stem is 21.5% to 79.5% of image width
    // pipe.width = 90px, so inset ~19px left and ~18px right → hitbox ~53px wide
    let leftInset  = pipe.width * 0.215;   // ~19px
    let rightInset = pipe.width * 0.205;   // ~18px
    let pipeLeft  = pipe.x + leftInset;
    let pipeRight = pipe.x + pipe.width - rightInset;

    if (
      right  > pipeLeft  &&
      left   < pipeRight &&
      (top   < pipe.top  || bottom > pipe.bottom)
    ) {
      loseGame();
    }
  });
}

function loseGame() {
  if (!questionActive) {
    gameRunning = false;
    questionActive = true;
    showQuestion();
  }
}

function showQuestion() {
  const questionBox = document.getElementById("questionBox");
  const questionText = document.getElementById("questionText");
  const answersDiv = document.getElementById("answers");
  const message = document.getElementById("message");

  questionBox.style.display = "block";
  answersDiv.innerHTML = "";
  message.innerHTML = "";

  let q = questions[Math.floor(Math.random() * questions.length)];
  questionText.innerText = q.question;

  q.options.forEach(option => {
    let btn = document.createElement("button");
    btn.innerText = option;

    btn.onclick = function() {
      if (option === q.answer) {
        message.innerHTML = "✅ Correct! Continue playing.";

        setTimeout(() => {
          questionBox.style.display = "none";
          resetAfterCorrectAnswer();
        }, 1000);

      } else {
        disableButtons();

        message.innerHTML =
          "❌ Wrong! The correct answer is: <b>" +
          q.answer +
          "</b><br><br>Game Over.";

        let restartBtn = document.createElement("button");
        restartBtn.innerText = "🔄 Restart Game";

        restartBtn.onclick = function() {
          restartGame();
        };

        answersDiv.appendChild(restartBtn);
      }
    };

    answersDiv.appendChild(btn);
  });
}

function disableButtons() {
  const buttons = document.querySelectorAll("#answers button");
  buttons.forEach(btn => btn.disabled = true);
}

function resetAfterCorrectAnswer() {
  bird.y = 220;
  bird.velocity = 0;

  pipes = [];
  pipeTimer = 0;

  questionActive = false;

  startCountdown();
}

function restartGame() {
  bird.y = 220;
  bird.velocity = 0;

  pipes = [];
  score = 0;
  pipeTimer = 0;

  questionActive = false;

  document.getElementById("questionBox").style.display = "none";
  document.getElementById("message").innerHTML = "";

  startCountdown();
}

function update() {
  drawBackground();

  if (gameRunning && !countdownActive) {
    bird.velocity += gravity;
    bird.y += bird.velocity;

    pipeTimer++;

    if (pipeTimer > 90) {
      createPipe();
      pipeTimer = 0;
    }

    pipes.forEach(pipe => {
      pipe.x -= 2;

      if (!pipe.passed && pipe.x + pipe.width < bird.x) {
        score++;
        pipe.passed = true;
      }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

    checkCollision();
  }

  drawPipes();
  drawBird();
  drawScore();

  // DEBUG: draw hitboxes (set debugHitbox = true to enable)
  if (debugHitbox) {
    // Bird hitbox
    let shrink = 0.30;
    ctx.strokeStyle = "lime";
    ctx.lineWidth = 2;
    ctx.strokeRect(
      bird.x - bird.width * (0.5 - shrink),
      bird.y - bird.height * (0.5 - shrink),
      bird.width * (1 - shrink*2),
      bird.height * (1 - shrink*2)
    );
    // Pipe hitboxes
    pipes.forEach(pipe => {
      let leftInset  = pipe.width * 0.215;
      let rightInset = pipe.width * 0.205;
      ctx.strokeStyle = "red";
      // Top pipe hitbox
      ctx.strokeRect(pipe.x + leftInset, 0, pipe.width - leftInset - rightInset, pipe.top);
      // Bottom pipe hitbox
      ctx.strokeRect(pipe.x + leftInset, pipe.bottom, pipe.width - leftInset - rightInset, canvas.height - pipe.bottom);
    });
  }

  if (countdownActive) {
    drawCountdown();
  }

  requestAnimationFrame(update);
}

startCountdown();
update();
</script>
